function searchCorpTable(query) {
  const exact   = CORP_TABLE.filter(c => c[0] === query);
  const partial = CORP_TABLE.filter(c => c[0] !== query && c[0].includes(query));
  return [...exact, ...partial]
    .slice(0, 10)
    .map(c => ({ corp_code: c[1], corp_name: c[0], stock_code: c[2] }));
}

// ── GitHub corps.json 기반 기업 검색 (캐시 12시간) ───────────────────────
const CORPS_JSON_URL = 'https://raw.githubusercontent.com/sbzzang7-gif/1antwo/main/corps.json';

async function searchCorpFromGitHub(query) {
  const cache    = caches.default;
  const cacheKey = new Request('https://dart-corps-github-cache/v1');

  let corps = null;
  const cached = await cache.match(cacheKey);
  if (cached) {
    corps = await cached.json();
  } else {
    const res = await fetch(CORPS_JSON_URL);
    if (!res.ok) return null;
    corps = await res.json();
    // 12시간 캐시
    await cache.put(cacheKey, new Response(JSON.stringify(corps), {
      headers: { 'Content-Type': 'application/json', 'Cache-Control': 'max-age=43200' }
    }));
  }

  if (!Array.isArray(corps)) return null;
  const exact   = corps.filter(c => c[0] === query);
  const partial = corps.filter(c => c[0] !== query && c[0].includes(query));
  return [...exact, ...partial].slice(0, 10)
    .map(c => ({ corp_code: c[1], corp_name: c[0], stock_code: c[2] || '' }));
}

// ── (하위호환) DART corpCode.xml 직접 다운로드 ────────────────────────────
async function searchCorpFromDartXml(key, query) {
  const cache    = caches.default;
  const cacheKey = new Request('https://dart-corp-xml-cache/v2');

  let xml = null;
  const cached = await cache.match(cacheKey);
  if (cached) {
    xml = await cached.text();
  } else {
    const zipRes = await fetch(
      `https://opendart.fss.or.kr/api/corpCode.xml?crtfc_key=${key}`,
      { headers: { "User-Agent": "Mozilla/5.0" } }
    );
    if (!zipRes.ok) return null;
    const buffer = await zipRes.arrayBuffer();
    xml = await extractXmlFromZip(buffer);
    if (!xml) return null;
    // 12시간 캐시
    await cache.put(cacheKey, new Response(xml, {
      headers: { 'Content-Type': 'text/plain; charset=utf-8', 'Cache-Control': 'max-age=43200' }
    }));
  }

  return searchXmlForCorp(xml, query);
}

// ── 재무 데이터 관련 함수 ─────────────────────────────────────────────────
async function dartGet(url) {
  const res = await fetch(url, {
    headers: { "User-Agent": "Mozilla/5.0", "Accept": "application/json" },
    cf: { cacheTtl: 0 }
  });
  return res.json();
}

function toUk(str) {
  if (!str || str === "-" || !str.trim()) return null;
  const s = str.replace(/,/g, "").trim();
  const n = s.startsWith("(") && s.endsWith(")")
    ? -parseInt(s.slice(1, -1), 10) : parseInt(s, 10);
  return isNaN(n) ? null : Math.round(n / 100_000_000);
}

function extract(d) {
  if (!d || d.status !== "000" || !d.list) return null;
  let revenue = null, opProfit = null, netProfit = null;

  // account_detail이 "-" 또는 빈 값인 상위 계정만 사용 (세부 항목 제외)
  const items = d.list.filter(i =>
    !i.account_detail || i.account_detail === "-" || i.account_detail === ""
  );

  // ord 순서대로 정렬 (DART 응답 순서가 보장되지 않을 수 있음)
  items.sort((a, b) => Number(a.ord || 0) - Number(b.ord || 0));

  for (const item of items) {
    const nm  = (item.account_nm || "").trim();
    const val = toUk(item.thstrm_amount);
    if (val === null) continue;

    // 매출액: 정확한 계정명만 매칭
    if (!revenue && /^(매출액|수익\(매출액\)|영업수익|매출)$/.test(nm))
      revenue = val;

    // 영업이익: "영업이익" 또는 "영업이익(손실)"만 — 세전계속영업이익 등 제외
    if (!opProfit && /^영업이익(\(손실\))?$/.test(nm))
      opProfit = val;

    // 당기순이익: 연결 전체 순이익 우선, 지배주주 귀속분 제외
    if (!netProfit && /^(당기순이익|당기순이익\(손실\)|분기순이익|분기순이익\(손실\)|당기순손실|분기순손실)$/.test(nm))
      netProfit = val;
  }
  return (revenue === null && opProfit === null) ? null : { revenue, opProfit, netProfit };
}

async function fetchFin(key, code, year, reprt) {
  const u = `https://opendart.fss.or.kr/api/fnlttSinglAcntAll.json?crtfc_key=${key}&corp_code=${code}&bsns_year=${year}&reprt_code=${reprt}`;
  try {
    const r1 = extract(await dartGet(u + "&fs_div=CFS"));
    if (r1) return r1;
    return extract(await dartGet(u + "&fs_div=OFS"));
  } catch { return null; }
}

function diff(a, b) {
  if (!a || !b) return null;
  const s = (x, y) => (x != null && y != null) ? x - y : null;
  return { revenue: s(a.revenue, b.revenue), opProfit: s(a.opProfit, b.opProfit), netProfit: s(a.netProfit, b.netProfit) };
}

// ── 메인 핸들러 ───────────────────────────────────────────────────────────
export default {
  async fetch(request, env) {
    if (request.method === "OPTIONS")
      return new Response("", { status: 200, headers: { ...CORS, "Access-Control-Allow-Methods": "GET" } });

    const KEY = env.DART_API_KEY;
    if (!KEY) return json({ error: "DART_API_KEY 없음" }, 500);

    const url = new URL(request.url);
    const p   = Object.fromEntries(url.searchParams);

    try {
      // ── 기업 검색 ──────────────────────────────────────────────────────
      if (p.action === "search_corp") {
        const query = (p.corp_name || "").trim();
        if (!query) return json({ error: "corp_name 필요" }, 400);

        // 1단계: 사전 테이블에서 즉시 검색
        const tableResults = searchCorpTable(query);
        if (tableResults.length > 0) {
          return json({ found: true, corps: tableResults, source: "table" });
        }

        // 2단계: GitHub corps.json (전체 기업 목록) 에서 검색
        try {
          const ghResults = await searchCorpFromGitHub(query);
          if (ghResults && ghResults.length > 0) {
            return json({ found: true, corps: ghResults, source: "github" });
          }
        } catch (e) { /* 실패 시 다음 단계로 */ }

        // 3단계: DART corpCode.xml 직접 다운로드 (최후 수단)
        try {
          const xmlResults = await searchCorpFromDartXml(KEY, query);
          if (xmlResults && xmlResults.length > 0) {
            return json({ found: true, corps: xmlResults, source: "dart_xml" });
          }
        } catch (e) { /* 실패 시 not found */ }

        return json({ found: false, message: `"${query}"에 해당하는 기업을 찾을 수 없습니다. corps.json이 아직 없을 수 있습니다.` });
      }

      // ── 재무 데이터 ────────────────────────────────────────────────────
      if (p.action === "get_financials") {
        const code = p.corp_code;
        if (!code) return json({ error: "corp_code 필요" }, 400);

        const now = new Date(), cy = now.getFullYear();
        const latestYear = cy - 1; // 항상 전년도부터

        // 연간: 최근 6개년 시도 → 데이터 있는 것만 최신 5개 반환
        const annYears = Array.from({ length: 6 }, (_, i) => String(latestYear - i));
        const annRaw   = await Promise.all(annYears.map(y => fetchFin(KEY, code, y, "11011")));
        const annual   = annYears
          .map((y, i) => annRaw[i] ? { year: y, ...annRaw[i] } : null)
          .filter(Boolean)
          .reverse()
          .slice(-5);

        // 분기: 최근 3개년 × 4분기
        const qYears  = [latestYear, latestYear - 1, latestYear - 2].map(String);
        const CODES   = ["11011", "11014", "11012", "11013"];
        const fetches = qYears.flatMap(y => CODES.map(c => ({ y, c })));
        const rawAll  = await Promise.all(fetches.map(f => fetchFin(KEY, code, f.y, f.c)));

        const cumMap = {};
        fetches.forEach(({ y, c }, i) => {
          if (!cumMap[y]) cumMap[y] = {};
          cumMap[y][c] = rawAll[i];
        });

        const quarterly = [];
        for (const yr of qYears) {
          const cm = cumMap[yr] || {}, yy = yr.slice(2);
          const q1 = cm["11013"];
          const q2 = diff(cm["11012"], cm["11013"]);
          const q3 = diff(cm["11014"], cm["11012"]);
          const q4 = diff(cm["11011"], cm["11014"]);
          if (q1?.revenue != null) quarterly.push({ quarter: yy + "Q1", ...q1 });
          if (q2?.revenue != null) quarterly.push({ quarter: yy + "Q2", ...q2 });
          if (q3?.revenue != null) quarterly.push({ quarter: yy + "Q3", ...q3 });
          if (q4?.revenue != null) quarterly.push({ quarter: yy + "Q4", ...q4 });
        }
        quarterly.sort((a, b) => a.quarter.localeCompare(b.quarter));
        return json({ annual, quarterly: quarterly.slice(-8) });
      }

      return json({ error: "알 수 없는 action" }, 400);

    } catch (err) {
      return json({ error: err.message }, 500);
    }
  }
};
