name: DART 기업 목록 업데이트

on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-corps:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - run: pip install requests

      - name: Download and parse DART corp list
        shell: python
        env:
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
        run: |
          import requests, zipfile, xml.etree.ElementTree as ET
          import json, io, os, sys

          api_key = os.environ.get('DART_API_KEY', '').strip()
          if not api_key:
              print("ERROR: DART_API_KEY not set")
              sys.exit(1)

          print("Downloading corpCode.xml ...")
          resp = requests.get('https://opendart.fss.or.kr/api/corpCode.xml?crtfc_key=' + api_key, timeout=60)
          print("Status:", resp.status_code)
          resp.raise_for_status()

          with zipfile.ZipFile(io.BytesIO(resp.content)) as zf:
              names = zf.namelist()
              print("ZIP contents:", names)
              xml_name = next((n for n in names if n.upper() == 'CORPCODE.XML'), None)
              if not xml_name:
                  print("ERROR: CORPCODE.XML not found")
                  sys.exit(1)
              xml_data = zf.read(xml_name)

          try:
              xml_str = xml_data.decode('utf-8')
          except:
              xml_str = xml_data.decode('euc-kr')

          root = ET.fromstring(xml_str)
          corps = []
          for item in root.findall('.//list'):
              code  = (item.findtext('corp_code') or '').strip()
              name  = (item.findtext('corp_name') or '').strip()
              stock = (item.findtext('stock_code') or '').strip()
              if code and name:
                  corps.append([name, code, stock])

          print("Total:", len(corps))
          with open('corps.json', 'w', encoding='utf-8') as f:
              json.dump(corps, f, ensure_ascii=False, separators=(',', ':'))
          print("Saved corps.json")

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add corps.json
          git diff --staged --quiet && echo "no changes" || git commit -m "chore: update DART corp list"
          git push
